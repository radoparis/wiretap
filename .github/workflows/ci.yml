name: CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

jobs:
  worker:
    name: Worker — ruff + mypy + pytest
    runs-on: ubuntu-latest
    timeout-minutes: 15
    defaults:
      run:
        working-directory: worker
    steps:
      - uses: actions/checkout@v4
      - name: Install uv
        uses: astral-sh/setup-uv@v5
      - name: Sync (hardware-free; native backends not needed for tests)
        run: uv sync
      - name: Ruff
        run: uv run ruff check .
      - name: Mypy
        run: uv run mypy
      - name: Pytest
        env:
          OPENCALLNOTES_AUDIO_BACKEND: synthetic
          OPENCALLNOTES_TRANSCRIBE_BACKEND: fake
        run: uv run pytest
